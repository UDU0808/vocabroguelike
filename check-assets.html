<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>素材加载检测</title>
  <style>
    body{margin:0;padding:24px;font-family:"Microsoft YaHei UI","PingFang SC",sans-serif;background:#071014;color:#eaf7ff;line-height:1.7}
    h1{margin:0 0 12px;font-size:24px}.ok{color:#83f5b2}.bad{color:#ff8b8b}.card{max-width:980px;margin:auto}.row{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.12);word-break:break-all}.hint{padding:14px 16px;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:rgba(255,255,255,.06);margin:12px 0 20px}code{background:rgba(255,255,255,.1);padding:2px 5px;border-radius:4px}
  </style>
</head>
<body>
  <div class="card">
    <h1>素材加载检测</h1>
    <p><code>20260706-v156-portrait-premium</code></p>
    <div class="hint">
      检查当前版本的配置、英雄、monster、Boss 统一动作表是否可访问。<br>
      monster / Boss 新标准：<code>attack 2×4</code>、<code>dash 1×4</code>、<code>hurt 1×4</code>、<code>walk 4×4</code>、<code>idle 1×4</code>，行顺序为前、左、右、后。
    </div>
    <div id="result">检测中...</div>
  </div>
<script>
const VERSION = '20260706-v156-portrait-premium';
const base = new URL('./', location.href);
function withVersion(file){ const url = new URL(file, base); url.searchParams.set('v', VERSION); return url; }
const coreFiles = [
  'index.html','game.js','styles.css','sw.js',
  'assets/config/heroes.json','assets/config/monsters.json','assets/config/bosses.json','assets/config/items.json','assets/config/levels.json','assets/config/words.json',
  'assets/words/words-difficulty-1.json','assets/items/items_projectiles_chests.webp','assets/levels/maze_layout.json','assets/ui/menu_bg_image2.webp',
  'assets/heroes/sunshangxiang/idle.webp','assets/heroes/duoliya/idle.webp','assets/heroes/wangzhaojun/idle.webp','assets/heroes/diaochan/idle.webp','assets/heroes/jialuo/idle.webp','assets/heroes/luna/idle.webp','assets/heroes/yao/idle.webp'
];
const result = document.getElementById('result');

async function fetchJson(file){
  const res = await fetch(withVersion(file), { cache:'no-cache' });
  if(!res.ok) throw new Error(`${file} HTTP ${res.status}`);
  return res.json();
}
function addActionFilesFromType(type, files){
  for (const action of Object.values(type.actions || {})) {
    if (action && action.src) files.add(action.src);
    else if (action && typeof action === 'object') {
      for (const def of Object.values(action)) if (def && def.src) files.add(def.src);
    }
  }
}
(async () => {
  const files = new Set(coreFiles);
  try {
    const monsters = await fetchJson('assets/config/monsters.json');
    for (const cfgPath of monsters.types || []) addActionFilesFromType(await fetchJson(cfgPath), files);
    const bosses = await fetchJson('assets/config/bosses.json');
    for (const cfgPath of bosses.bosses || []) addActionFilesFromType(await fetchJson(cfgPath), files);
  } catch (err) {
    result.innerHTML = `<div class="row bad">配置读取失败：${err.message}</div>`;
    return;
  }

  const rows = [];
  let okCount = 0;
  for (const file of files) {
    try {
      const res = await fetch(withVersion(file), { cache: 'no-cache' });
      if (res.ok) { okCount++; rows.push(`<div class="row ok">OK ${file}</div>`); }
      else rows.push(`<div class="row bad">FAIL ${file} HTTP ${res.status}</div>`);
    } catch (err) {
      rows.push(`<div class="row bad">FAIL ${file} ${err.message}</div>`);
    }
  }
  result.innerHTML = `<p>检测完成：${okCount}/${files.size} 个文件可访问。</p>` + rows.join('');
})();
</script>
</body>
</html>
